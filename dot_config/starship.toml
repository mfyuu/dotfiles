add_newline = false

"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$directory\
$git_branch\
$git_status\
$package\
$nodejs\
$bun\
$deno\
$python\
$rust\
$golang\
$ruby\
$lua\
$swift\
$zig\
$aws\
$gcloud\
$docker_context\
$nix_shell\
$hostname\
$cmd_duration\
${custom.git_line_break}\
$character"""

[character]
success_symbol = "[έηε](bold fg:#50fa7b)"
error_symbol = "[έηε](bold fg:#ff5555)"

[aws]
symbol = "ΌΝ╜ "

[bun]
symbol = "Όζψ "

[deno]
symbol = "ΌθΑ "

[directory]
read_only = " ≤░Ν╛"

[docker_context]
symbol = "ΎΝΙ "

[gcloud]
symbol = "Όθ▒ "

[git_branch]
symbol = "ΎΡα "

[git_commit]
tag_symbol = ' ΎΡΤ '

[git_status]
format = "[$all_status$ahead_behind ]($style)"
staged = "[+${count}](fg:#50fa7b)"
modified = "[!${count}](fg:#f1fa8c)"
ahead = "[έΘκ${count}](fg:#50fa7b)"
behind = "[έΘμ${count}](fg:#ff5555)"
diverged = "[έΘκ${ahead_count}έΘμ:${behind_count}](fg:#ff5555)"
conflicted = ""
untracked = "[?${count}](fg:#f1fa8c)"
stashed = ""
renamed = ""
deleted = ""

[golang]
symbol = "Όαπ "

[hostname]
ssh_symbol = "ΌυΒ "

[lua]
symbol = "Όαι "

[memory_usage]
